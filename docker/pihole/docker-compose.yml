version: "3.8"
services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
      - "80:80/tcp"
      - "443:443/tcp" #Optional HTTPS
    environment:
      TZ: "Etc/UTC" # Replace with your timezone
      WEBPASSWORD: "your_strong_password" # Change this to a strong password!
      #Uncomment and modify the next line for conditional forwarding.
      #CONDITIONAL_FORWARDING: "true"
      #CONDITIONAL_FORWARDING_IP: "192.168.1.1" #IP of your router
      #CONDITIONAL_FORWARDING_DOMAIN: "local.lan" #Replace with your local domain name.

    volumes:
      - "./etc-pihole/:/etc/pihole/"
      - "./etc-dnsmasq.d/:/etc/dnsmasq.d/"
    # Recommended but not required (DHCP needs NET_ADMIN)
    cap_add:
      - NET_ADMIN
    restart: unless-stopped